# 示例 YAML Skill - 个性化问候
# 展示 Jinja2 模板执行类型

name: greeting
description: 生成个性化的问候语
version: 1.0.0
category: utility
tags:
  - 模板
  - 示例

parameters:
  name:
    type: string
    description: 用户姓名
  title:
    type: string
    description: 用户称呼/职位
    default: 先生/女士

required:
  - name

returns:
  type: string
  description: 生成的问候语

execution: |
  你好，{{ title }} {{ name }}！欢迎使用 Agnes Agent 框架。
  这是一个通过 YAML 定义的技能，不需要编写任何 Python 代码。
  当前时间：{{ datetime.now().strftime('%Y-%m-%d %H:%M:%S') }}

execution_type: template
requires:
  - datetime
