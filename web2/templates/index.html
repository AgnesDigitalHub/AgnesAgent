<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Agnes Agent 控制台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 基础布局样式 -->
    <style>
        /* 确保容器不坍塌 */
        html, body, #root, .amis-Layout {
            height: 100vh !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>

    <!-- 引用标准 SDK (使用稳定版本 6.10.0) -->
    <link rel="stylesheet" href="https://unpkg.com/amis@6.10.0/sdk/cxd.css" />
    <link rel="stylesheet" href="https://unpkg.com/amis@6.10.0/sdk/helper.css" />
    <link rel="stylesheet" href="https://unpkg.com/amis@6.10.0/sdk/iconfont.css" />
    <script src="https://unpkg.com/amis@6.10.0/sdk/sdk.js"></script>

    <!-- 二次元主题样式（必须在AMIS之后加载才能覆盖） -->
    <link rel="stylesheet" href="/static/css/anime-theme.css" />

    <!-- 二次元主题覆盖样式 -->
    <style>
        /* 覆盖 AMIS 默认样式，应用二次元主题 */
        
        /* 侧边栏 - 纯色粉色 */
        .amis-Layout-aside {
            background: #ffb6c1 !important;
            border-right: none !important;
        }

        /* 侧边栏菜单项 */
        .amis-AsideNav-item a,
        .nav-link {
            display: block !important;
            padding: 12px 20px !important;
            color: rgba(255, 255, 255, 0.85) !important;
            border-radius: 0 20px 20px 0 !important;
            margin: 2px 8px !important;
            text-decoration: none !important;
            transition: all 0.2s ease !important;
        }

        .amis-AsideNav-item a:hover,
        .nav-link:hover {
            background: rgba(255, 182, 193, 0.15) !important;
            color: white !important;
        }

        .amis-AsideNav-item.is-active a,
        .amis-AsideNav-item.is-active .nav-link {
            background: rgba(255, 182, 193, 0.25) !important;
            border-left: 3px solid #ffb6c1 !important;
            color: white !important;
        }

        /* 主内容区域背景 - 深黄色 */
        .amis-Layout-content {
            background: #f5e6a3 !important;
        }

        /* 卡片样式 - 萌系圆角 */
        .amis-Card {
            border-radius: 16px !important;
            border: 1px solid #ffe4e1 !important;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04) !important;
        }

        .amis-Card:hover {
            box-shadow: 0 4px 12px rgba(255, 182, 193, 0.15) !important;
        }

        /* 按钮样式 - 柔和渐变 */
        .amis-Button--primary {
            background: linear-gradient(135deg, #ffb6c1, #ffc0cb) !important;
            border: none !important;
            border-radius: 20px !important;
            box-shadow: 0 2px 8px rgba(255, 182, 193, 0.3) !important;
        }

        .amis-Button--primary:hover {
            transform: translateY(-1px) !important;
            box-shadow: 0 4px 12px rgba(255, 182, 193, 0.4) !important;
        }

        /* 表格样式 */
        .amis-Table {
            border-radius: 12px !important;
            overflow: hidden !important;
        }

        .amis-Table th {
            background: #f8f4ff !important;
            color: #7a7a7a !important;
            font-weight: 600 !important;
        }

        /* 输入框样式 */
        .amis-Form-control {
            border-radius: 12px !important;
            border: 1px solid #e0d6d6 !important;
            transition: all 0.2s ease !important;
        }

        .amis-Form-control:focus {
            border-color: #ffb6c1 !important;
            box-shadow: 0 0 0 3px rgba(255, 182, 193, 0.15) !important;
        }

        /* 标签样式 */
        .amis-Tag {
            border-radius: 20px !important;
            padding: 4px 12px !important;
        }

        /* 加载动画 - 樱花 */
        .amis-Spinner {
            border-color: #ffb6c1 !important;
            border-top-color: transparent !important;
        }

        /* 页面标题 */
        .amis-Page-title {
            color: #4a4a4a !important;
            font-weight: 600 !important;
        }

        /* 面包屑导航 */
        .amis-Breadcrumb {
            color: #999 !important;
        }

        .amis-Breadcrumb-item:hover {
            color: #ff85a2 !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        (async function() {
            try {
                const response = await fetch('/app.json');
                const rawData = await response.json();

                // 【核心修正】强制确保数据结构正确
                const finalAppConfig = {
                    type: "app", // 强制指定类型
                    brandName: rawData.brandName || "Agnes Agent",
                    pages: rawData.pages || [] // 强制确保 pages 存在
                };

                // 保留原始配置中的其他字段，包括 layout 等关键布局设置
                Object.keys(rawData).forEach(key => {
                    if (!['type', 'brandName', 'pages'].includes(key)) {
                        finalAppConfig[key] = rawData[key];
                    }
                });

                // 检查 pages 是否真的有数据
                if (finalAppConfig.pages.length === 0) {
                    alert("错误：pages 数组是空的！后端配置可能有问题。");
                    return;
                }

                const amis = amisRequire('amis/embed');

                // AMIS 自动生成失败，改用原生HTML直接创建侧边栏
                // 保证100%能生成DOM节点
                const root = document.getElementById('root');

                // 创建原生侧边栏 HTML
                let navHtml = `
                    <div style="display: flex; height: 100vh; margin: 0; padding: 0;">
                        <!-- 原生侧边栏 -->
                        <div class="amis-Layout-aside" style="
                            width: 220px;
                            min-width: 220px;
                            height: 100%;
                            overflow-y: auto;
                            flex-shrink: 0;
                            background: #ffb6c1;
                        ">
                            <div style="
                                padding: 20px 15px;
                                border-bottom: 1px solid rgba(255,255,255,0.2);
                                color: white;
                                font-size: 18px;
                                font-weight: bold;
                                text-align: center;
                            ">
                                <img src="/static/assets/images/placeholders/icon-mascot.svg"
                                     alt="Mascot"
                                     style="width: 64px; height: 64px; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto;"
                                     onerror="this.style.display='none'">
                                ${finalAppConfig.brandName}
                            </div>
                            <nav style="padding: 10px 0;">
                `;

                // 递归添加菜单项（支持嵌套分组）
                function renderMenuItems(items, indent = 0) {
                    let html = '';
                    items.forEach((p) => {
                        const icon = p.icon || '';
                        // 如果有 children，渲染为折叠分组
                        if (p.children && p.children.length > 0) {
                            // 分组标题（不可点击，只展开子菜单）
                            const chevronHtml = p.children.length > 0 ? '<i class="fa fa-chevron-down" style="float: right; margin-top: 4px; font-size: 12px;"></i>' : '';
                            html += `
                                <div class="amis-AsideNav-item-group" style="margin: 2px 0; padding-left: ${indent * 15}px;">
                                    <div style="
                                        display: block;
                                        padding: 10px 20px;
                                        color: rgba(255,255,255,0.7);
                                        font-weight: 600;
                                        font-size: 13px;
                                    ">
                                        ${icon ? `<i class="${icon}" style="margin-right: 8px;"></i>` : ''}
                                        <span>${p.label}</span>
                                        ${chevronHtml}
                                    </div>
                                    <div style="padding-left: 10px;">
                                        ${renderMenuItems(p.children, indent + 1)}
                                    </div>
                                </div>
                            `;
                        } else if (p.url) {
                            // 跳过首页，因为它在初始加载时已经渲染了
                            if (p.url === '/') {
                                return;
                            }
                            // 从 url 提取 pageName 用于 API 请求
                            // url 格式是 "/personas" => pageName = "personas"
                            const pageName = p.url.replace(/^\//, '');
                            html += `
                                <div class="amis-AsideNav-item" style="margin: 2px 0; padding-left: ${indent * 15}px;">
                                    <a href="javascript:void(0);" data-page-name="${pageName}" data-page-url="${p.url}" class="nav-link">
                                        ${icon ? `<i class="${icon}" style="margin-right: 8px;"></i>` : ''}
                                        <span>${p.label}</span>
                                    </a>
                                </div>
                            `;
                        }
                    });
                    return html;
                }

                // 在最顶部添加首页按钮（跳转到 /）
                navHtml += `
                    <div class="amis-AsideNav-item" style="margin: 2px 0;">
                        <a href="javascript:void(0);" data-page-name="index" data-page-url="/" class="nav-link">
                            <i class="fa fa-home" style="margin-right: 8px;"></i>
                            <span>首页</span>
                        </a>
                    </div>
                    <div style="border-bottom: 1px solid #2c3e50; margin: 8px 0;"></div>
                `;

                // 递归渲染所有菜单项（支持嵌套分组）
                navHtml += renderMenuItems(finalAppConfig.pages);

                navHtml += `
                            </nav>
                        </div>
                        <!-- 主内容区域，让 AMIS 在这里渲染 -->
                        <div id="amis-main-content" style="
                            flex: 1;
                            height: 100%;
                            overflow-y: auto;
                            background: #f5e6a3;
                            padding: 20px;
                        ">
                        </div>
                    </div>
                `;

                // 直接写入原生 HTML
                root.innerHTML = navHtml;

                // 在主内容区域使用 AMIS 渲染首页
                const homePage = finalAppConfig.pages.find(p => p.url === '/');
                contentTarget = document.getElementById('amis-main-content');

                if (homePage && homePage.schema) {
                    amis.embed('#amis-main-content', homePage.schema, {}, {
                        theme: 'cxd',
                        locale: 'zh-CN'
                    });
                } else {
                    contentTarget.innerHTML = `<h1>欢迎使用 ${finalAppConfig.brandName}</h1><p>请点击左侧导航选择功能</p>`;
                }

                // ============ 核心修复：拦截菜单点击，异步加载页面 ============
                let currentPageName = null;

                // 高亮当前选中的菜单项
                function setActiveMenuItem(pageName) {
                    document.querySelectorAll('.amis-AsideNav-item a').forEach(link => {
                        link.parentElement.style.backgroundColor = '';
                        if (link.getAttribute('data-page-name') === pageName) {
                            link.parentElement.style.backgroundColor = '#242e3e';
                            link.style.color = '#ffffff';
                        } else {
                            link.style.color = 'rgba(255,255,255,0.85)';
                        }
                    });
                }

                // 异步加载并渲染页面
                async function loadPage(pageName) {
                    if (pageName === currentPageName) {
                        return;
                    }

                    currentPageName = pageName;
                    setActiveMenuItem(pageName);

                    // 首页特殊处理：显示初始欢迎页，不需要请求 API
                    if (pageName === 'index') {
                        // 更新浏览器地址栏（不刷新页面）
                        if (window.history && window.history.pushState) {
                            window.history.pushState({ pageName }, '', '/');
                        }

                        // 找到初始配置中的首页 schema 重新渲染（和页面刚加载时一样）
                        const homePage = window.finalAppConfig.pages.find(p => p.url === '/');
                        if (homePage && homePage.schema) {
                            contentTarget.innerHTML = '';
                            const amis = amisRequire('amis/embed');
                            amis.embed('#amis-main-content', homePage.schema, {}, {
                                theme: 'cxd',
                                locale: 'zh-CN'
                            });
                        } else {
                            // 如果没有找到，fallback 到欢迎文字
                            contentTarget.innerHTML = `<h1>欢迎使用 ${window.finalAppConfig.brandName}</h1><p>请点击左侧导航选择功能</p>`;
                        }
                        return;
                    }

                    // 普通页面：请求 API 获取 schema
                    const apiPageName = pageName;

                    // 更新浏览器地址栏（不刷新页面）
                    if (window.history && window.history.pushState) {
                        if (pageName === 'index') {
                            window.history.pushState({ pageName }, '', '/');
                        } else {
                            window.history.pushState({ pageName }, '', `/${pageName}`);
                        }
                    }

                    // 显示加载中
                    contentTarget.innerHTML = `
                        <div style="text-align: center; padding: 50px; color: #999;">
                            <div>加载中...</div>
                        </div>
                    `;

                    try {
                        // 异步请求页面 schema（添加时间戳防止缓存）- API 路径来自全局配置中的 apiPrefix
                        const apiPrefix = window.finalAppConfig?.apiPrefix || '/api';
                        const response = await fetch(`${apiPrefix}/pages/${apiPageName}?_t=${Date.now()}`);
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                        }
                        const schema = await response.json();

                        // 清空内容区域并用 AMIS 渲染
                        contentTarget.innerHTML = '';
                        const amis = amisRequire('amis/embed');
                        amis.embed('#amis-main-content', schema, {}, {
                            theme: 'cxd',
                            locale: 'zh-CN'
                        });
                    } catch (e) {
                        console.error(`❌ 加载页面 ${apiPageName} 失败:`, e);
                        contentTarget.innerHTML = `
                            <div style="color: #ff4d4f; padding: 20px; background: #fff1f0; border: 1px solid #ffa39e; border-radius: 4px;">
                                <h3>加载页面失败</h3>
                                <p>${e.message}</p>
                                <p>API 路径: ${apiPrefix}/pages/${apiPageName}</p>
                            </div>
                        `;
                    }
                }

                // 绑定点击事件
                document.querySelectorAll('.amis-AsideNav-item a[data-page-name]').forEach(link => {
                    link.addEventListener('click', function(e) {
                        const pageName = this.getAttribute('data-page-name');
                        if (pageName) {
                            e.preventDefault();
                            loadPage(pageName);
                        }
                    });
                });

                // 处理浏览器前进/后退
                window.addEventListener('popstate', function(e) {
                    if (e.state && e.state.pageName) {
                        loadPage(e.state.pageName);
                    }
                });

                // 如果初始 URL 已经有路径，尝试加载对应页面
                const initialPath = window.location.pathname.replace(/^\//, '');
                if (initialPath && initialPath !== '') {
                    setTimeout(() => loadPage(initialPath), 100);
                }

                // 将最终配置保存到 window 供后续使用（需要 apiPrefix）
                window.finalAppConfig = finalAppConfig;
            } catch (e) {
                console.error("初始化崩溃:", e);
                const root = document.getElementById('root');
                if (root) {
                    root.innerHTML = `<div style="color:red; padding: 20px;">初始化崩溃: ${e.message}</div>`;
                }
            }
        })();
    </script>
</body>
</html>
