# Agnes Web2 - Amis SPA 应用配置
# 异步按需加载版本：
# 1. 顶层 App 只返回路由信息和 schemaApi
# 2. 用户点击页面时，前端请求 /api/pages/{page_name} 获取 schema
# 3. 后端每次请求用 Pydantic 重新构建 schema 返回

app:
  title: "Agnes Agent 控制台"
  description: "基于 FastAPI + python-amis 的管理控制台"

# 应用基础配置
config:
  theme: "cxd"
  locale: "zh-CN"
  api_prefix: "/api"
  log_level: "info"

# 左侧导航菜单配置
menus:
  - name: "dashboard"
    label: "概览"
    icon: "home"
    url: "/dashboard"

  - name: "interaction"
    label: "对话交互"
    icon: "chat_bubble"
    children:
      - name: "chat"
        label: "对话聊天"
        icon: "chat"
        url: "/chat"
      - name: "prompts"
        label: "Prompt IDE"
        icon: "edit_note"
        url: "/prompts"

  - name: "resources"
    label: "资源管理"
    icon: "folder_open"
    children:
      - name: "models"
        label: "模型管理"
        icon: "smart_toy"
        url: "/models"
      - name: "personas"
        label: "人格管理"
        icon: "face"
        url: "/personas"
      - name: "knowledge"
        label: "知识库/RAG"
        icon: "menu_book"
        url: "/knowledge"
      - name: "tools"
        label: "工具管理"
        icon: "build"
        url: "/tools"
      - name: "skills"
        label: "Skills 管理"
        icon: "extension"
        url: "/skills"

  - name: "mcp"
    label: "MCP 管理"
    icon: "plug"
    children:
      - name: "mcp_market"
        label: "工具市场"
        icon: "search"
        url: "/mcp/market"
      - name: "mcp_servers"
        label: "服务器管理"
        icon: "settings"
        url: "/mcp/servers"
      - name: "mcp_secrets"
        label: "密钥管理"
        icon: "vpn_key"
        url: "/mcp/secrets"
      - name: "mcp_presets"
        label: "预设模板"
        icon: "widgets"
        url: "/mcp/presets"
      - name: "mcp_logs"
        label: "调用日志"
        icon: "history"
        url: "/mcp/logs"

  - name: "development"
    label: "开发调试"
    icon: "code"
    children:
      - name: "skill_debug"
        label: "Skill 调试器"
        icon: "bug_report"
        url: "/skill_debug"
      - name: "workflows"
        label: "Workflow 编排"
        icon: "account_tree"
        url: "/workflows"
      - name: "logs"
        label: "运行日志"
        icon: "article"
        url: "/logs"

  - name: "system"
    label: "系统管理"
    icon: "settings_applications"
    children:
      - name: "publish"
        label: "API/集成发布"
        icon: "publish"
        url: "/publish"
      - name: "users"
        label: "用户权限"
        icon: "group"
        url: "/users"
      - name: "settings"
        label: "系统设置"
        icon: "settings"
        url: "/settings"

# 页面定义
