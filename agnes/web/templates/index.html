<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes Agent - Web 控制台</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- 使用 amis 6.x 正确的 SDK 包 -->
    <link rel="stylesheet" title="default" href="https://unpkg.com/amis@6.3.0/sdk/sdk.css">
    <link rel="stylesheet" href="https://unpkg.com/amis@6.3.0/sdk/helper.css">
    <link rel="stylesheet" href="https://unpkg.com/amis@6.3.0/sdk/iconfont.css">
    <script src="https://unpkg.com/amis@6.3.0/sdk/sdk.js"></script>

    <style>
        html, body, .app-wrapper {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root" class="app-wrapper"></div>

    <script>
        // 全局 WebSocket 管理器
        let chatWebSocket = null;
        let chatMessageHandlers = [];

        function connectChatWebSocket() {
            if (chatWebSocket && chatWebSocket.readyState === WebSocket.OPEN) {
                return chatWebSocket;
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/chat`;
            chatWebSocket = new WebSocket(wsUrl);

            chatWebSocket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                chatMessageHandlers.forEach(handler => handler(data));
            };

            chatWebSocket.onclose = () => {
                chatWebSocket = null;
            };

            return chatWebSocket;
        }

        function sendChatMessage(message, useHistory = true) {
            const ws = connectChatWebSocket();
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ message, use_history: useHistory }));
            } else {
                ws.onopen = () => {
                    ws.send(JSON.stringify({ message, use_history: useHistory }));
                };
            }
        }

        function addChatMessageHandler(handler) {
            chatMessageHandlers.push(handler);
            return () => {
                chatMessageHandlers = chatMessageHandlers.filter(h => h !== handler);
            };
        }

        async function initAmis() {
            try {
                // Fetch complete app configuration from backend (all schemas embedded)
                const response = await fetch('/web2/app.json');
                if (!response.ok) {
                    throw new Error(`Failed to load app config: ${response.status} ${response.statusText}`);
                }
                const amisApp = await response.json();

                let amisEnv = {
                    theme: 'cxd',
                    locale: 'zh-CN',
                    fetcher: function(options) {
                        let url = options.url;
                        let method = options.method || 'GET';
                        let data = options.data;

                        return fetch(url, {
                            method: method,
                            body: data ? JSON.stringify(data) : undefined,
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        }).then(function(response) {
                            return response.json();
                        });
                    },
                    isCancel: function() { return false; },
                    notify: function(type, msg) {
                        console.log(type, msg);
                    }
                };

                // 兼容不同版本的 Amis SDK 导出
                let amisModule = window.amis;
                console.log('Initial window.amis:', window.amis);
                console.log('window.amisRequire:', window.amisRequire);

                // Amis 6.x SDK 将导出放在 window.amis.default
                if (window.amis && window.amis.default && !window.amis.embed) {
                    amisModule = window.amis.default;
                }
                // 如果通过 require 导出
                else if (window.amisRequire) {
                    try {
                        amisModule = window.amisRequire('amis');
                    } catch (e) {
                        console.warn('Failed to get amis via require:', e);
                    }
                }
                // 如果 window.amis 本身就是个工厂函数
                else if (typeof window.amis === 'function' && (!amisModule || !amisModule.embed)) {
                    try {
                        amisModule = window.amis();
                    } catch (e) {
                        console.warn('Failed to call amis factory:', e);
                    }
                }

                // 从 window.amis.embed 开始找，然后是 default.embed
                let embedFn = null;
                if (window.amis && window.amis.embed) {
                    embedFn = window.amis.embed;
                } else if (amisModule && amisModule.embed) {
                    embedFn = amisModule.embed;
                } else if (amisModule && amisModule.default && amisModule.default.embed) {
                    embedFn = amisModule.default.embed;
                }

                if (embedFn) {
                    try {
                        embedFn('#root', amisApp, {
                            // 这里可以传初始数据
                        }, amisEnv);
                        console.log('渲染成功');
                    } catch (err) {
                        showError("渲染逻辑崩溃: " + err.message);
                    }
                } else if (amisModule) {
                    const keys = Object.keys(amisModule);
                    console.error('Available exports:', keys);
                    showError(`SDK 格式错误：找不到 embed 方法。找到：${keys.join(',')}`);
                } else {
                    showError("SDK 格式错误：window.amis 不存在");
                }
            } catch (e) {
                console.error('Failed to load amis app:', e);
                showError(e.message);
            }
        }

        function showError(message) {
            document.getElementById('root').innerHTML = `
                <div style="padding: 20px; font-family: sans-serif;">
                    <h1>加载失败</h1>
                    <p>错误信息: ${message}</p>
                </div>
            `;
        }

        if (document.readyState === 'complete') {
            setTimeout(initAmis, 100);
        } else {
            window.addEventListener('load', function() {
                setTimeout(initAmis, 100);
            });
        }
    </script>
</body>
</html>
